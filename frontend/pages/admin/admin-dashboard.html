<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | QueueSmart</title>

    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/nav.css?v=3">
    <link rel="stylesheet" href="../../css/admin.css">
</head>
<body>
    <div class="app-layout">

        <!-- Sidebar loads here -->
        <div id="nav-container"></div>

        <!-- Main Content -->
        <main class="app-main" id="adminDashboard">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-6);">
                <h1>Admin Dashboard</h1>
                <button class="btn btn-primary" id="exportReportBtn" onclick="exportReport()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 6px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Export Report
                </button>
            </div>

            <!-- Summary Stats -->
            <div class="stats-grid" style="margin-bottom: var(--space-6);">
                <div class="stat-card">
                    <div class="stat-value" id="statTotalServices">0</div>
                    <div class="stat-label">Total Services</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statActiveQueues">0</div>
                    <div class="stat-label">Active Queues</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statUsersWaiting">0</div>
                    <div class="stat-label">Users Waiting</div>
                </div>
            </div>

            <!-- Services Overview with Quick Actions -->
            <section class="card">
                <h2 style="margin-bottom: var(--space-4);">Services Overview</h2>
                <div id="dashboardServicesTable"></div>
            </section>

        </main>
    </div>

    <script src="../../js/router.js"></script>
    <script src="../../js/nav.js?v=4"></script>
    <script src="../../js/admin.js"></script>
</body>
</html>
