<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | QueueSmart</title>

    <link rel="stylesheet" href="../../css/global.css">
    <link rel="stylesheet" href="../../css/nav.css?v=3">
</head>
<body>
    <div class="app-layout">

        <div id="nav-container"></div>

        <main class="app-main">
            <h1 style="margin-bottom: var(--space-6);">Notifications</h1>

            <section class="card">
                <p style="margin-bottom: var(--space-4); color: var(--gray-600); font-size: 0.95rem;">
                    Close to being served means you are in one of the <strong>top 3</strong> positions for that service (after priority and arrival ordering).
                </p>
                <ul id="notificationsPageList" style="list-style: none; padding: 0; display: flex; flex-direction: column; gap: var(--space-4);">
                    <li style="padding: var(--space-3);">Loading…</li>
                </ul>
            </section>

        </main>
    </div>

    <script src="../../js/router.js"></script>
    <script src="../../js/nav.js?v=4"></script>
    <script type="module" src="../../js/user.js"></script>
</body>
</html>
